# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to use for the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow alembic to search for writing scripts
# relative to the current directory
# sourceless = false

# version location specification; this defaults to alembic/versions.
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version_path_separator = :

# set to 'true' to enable searching for SQL scripts
# and scripts relative to the parent directories
# search_path = false

# the database URL is loaded dynamically in env.py from settings, so this placeholder is optional
sqlalchemy.url = postgresql://admin:luxe_secure_pass@localhost:5432/lashes_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
